<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="todo-app">
        <h2>To-Do List <img src="images/to-do-list-icon.jpg" alt="Icon"></h2>
        
        <div class="row">
            <input type="text" id="input-box" placeholder="Add Task...">
            <select id="priority-select">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button id="add-button">Add</button>
        </div>

        <div id="status-bar">
            <span id="progress-text">0/0 Tasks done</span>
            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div class="controls">
            <button id="sort-button">Sort: High to Low</button>
            <div class="filters">
                <label><input type="radio" name="filter" value="all" checked> All</label>
                <label><input type="radio" name="filter" value="open"> Open</label>
                <label><input type="radio" name="filter" value="checked"> Done</label>
            </div>
        </div>

        <ul id="list-container"></ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
